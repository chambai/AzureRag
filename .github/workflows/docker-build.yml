name: Build, Push, Deploy and Test

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Azure/**'
      - 'GpuLocal/**'

jobs:
  # Detect what changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      azurefunction: ${{ steps.filter.outputs.azurefunction }}
      gpulocal: ${{ steps.filter.outputs.gpulocal }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            azurefunction:
              - 'Azure/**'
            gpulocal:
              - 'GpuLocal/**'

  # Unit Tests — AzureFunction (C# / xUnit)
  unit-tests-azurefunction:
    needs: detect-changes
    if: needs.detect-changes.outputs.azurefunction == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          cd Azure
          dotnet restore

      - name: Run AzureFunction unit tests
        run: |
          cd Azure
          dotnet test AzureFunction.slnx --configuration Release

  # Unit Tests — GpuLocal (Python / pytest)
  unit-tests-gpulocal:
    needs: detect-changes
    if: needs.detect-changes.outputs.gpulocal == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (CPU-safe)
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          cd GpuLocal
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        env:
          # Prevent torch / transformers from touching CUDA
          CUDA_VISIBLE_DEVICES: ""
          TRANSFORMERS_NO_TORCH: "1"
          PYTHONPATH: .
        run: |
          pytest GpuLocal/tests -v

  # Build & Push — AzureFunction
  build-azurefunction:
    needs: unit-tests-azurefunction
    if: needs.detect-changes.outputs.azurefunction == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Build and push AzureFunction image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/azurefunction:latest

          docker build \
            -t $IMAGE_NAME \
            -f Azure/AzureFunction/Dockerfile \
            Azure/AzureFunction

          docker push $IMAGE_NAME

  # Build & Push — GpuLocal
  build-gpulocal:
    needs: unit-tests-gpulocal
    if: needs.detect-changes.outputs.gpulocal == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Build and push GpuLocal image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/gpulocal:latest

          docker build \
            --progress=plain \
            -t $IMAGE_NAME \
            -f GpuLocal/Dockerfile \
            GpuLocal

          docker push $IMAGE_NAME

  # Deploy — AzureFunction (machine-a)
  deploy-azurefunction:
    needs: build-azurefunction
    if: needs.detect-changes.outputs.azurefunction == 'true'
    runs-on: [self-hosted, machine-b]
    
    steps:
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Pull & run GpuLocal container
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/azurefunction:latest
          docker stop azurefunction || true
          docker rm azurefunction || true
          docker run -d \
            --name azurefunction \
            -p 8000:80 \
            ghcr.io/${{ github.repository_owner }}/azurefunction:latest


  # Deploy — GpuLocal (machine-b)
  deploy-gpulocal:
    needs: build-gpulocal
    if: needs.detect-changes.outputs.gpulocal == 'true'
    runs-on: [self-hosted, machine-b]

    steps:
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Pull & run GpuLocal container
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/gpulocal:latest
          docker stop gpulocal || true
          docker rm gpulocal || true
          docker run -d \
            --name gpulocal \
            -p 8080:80 \
            ghcr.io/${{ github.repository_owner }}/gpulocal:latest

  # End-to-End Tests (Postman / Newman)
  e2e-tests:
    needs: [deploy-azurefunction, deploy-gpulocal]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman E2E tests
        run: |
          newman run postman/AzureRag_E2E.json \
            --env-var "AZUREFUNCTION=http://machine-b:8000" \
            --env-var "GPULOCAL=http://machine-b:8080"
