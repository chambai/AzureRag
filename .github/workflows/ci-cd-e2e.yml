name: Build, Push, Deploy and Test

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
    inputs:
      run_unit_tests:
        type: boolean
        default: false
        description: "Run unit tests"
      run_build:
        type: boolean
        default: false
        description: "Run build jobs"
      run_deploy:
        type: boolean
        default: false
        description: "Run deploy jobs"
      run_e2e:
        type: boolean
        default: true
        description: "Run E2E tests"
  push:
    branches:
      - main
    paths:
      - 'Azure/**'
      - 'GpuLocal/**'

jobs:
  # Detect what changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      azurefunction: ${{ steps.filter.outputs.azurefunction }}
      gpulocal: ${{ steps.filter.outputs.gpulocal }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            azurefunction:
              - 'Azure/**'
            gpulocal:
              - 'GpuLocal/**'

  # Unit Tests — AzureFunction (C# / xUnit)
  unit-tests-azurefunction:
    needs: detect-changes
    if: |
        github.event_name == 'push' &&
        needs.detect-changes.outputs.azurefunction == 'true'
        ||
        github.event_name == 'workflow_dispatch' &&
        inputs.run_unit_tests == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          cd Azure
          dotnet restore

      - name: Run AzureFunction unit tests
        run: |
          cd Azure
          dotnet test AzureFunction.slnx --configuration Release

  # Unit Tests — GpuLocal (Python / pytest)
  unit-tests-gpulocal:
    needs: detect-changes
    if: |
        github.event_name == 'push' &&
        needs.detect-changes.outputs.gpulocal == 'true'
        ||
        github.event_name == 'workflow_dispatch' &&
        inputs.run_unit_tests == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (CPU-safe)
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          cd GpuLocal
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        env:
          # Prevent torch / transformers from touching CUDA
          CUDA_VISIBLE_DEVICES: ""
          TRANSFORMERS_NO_TORCH: "1"
          PYTHONPATH: .
        run: |
          pytest GpuLocal/tests -v

  # Build & Push — AzureFunction
  build-azurefunction:
    needs: unit-tests-azurefunction
    if: |
        github.event_name == 'push' &&
        needs.detect-changes.outputs.azurefunction == 'true'
        ||
        github.event_name == 'workflow_dispatch' &&
        inputs.run_build == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Build and push AzureFunction image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/azurefunction:latest

          docker build \
            -t $IMAGE_NAME \
            -f Azure/AzureFunction/Dockerfile \
            Azure/AzureFunction

          docker push $IMAGE_NAME

  # Build & Push — GpuLocal
  build-gpulocal:
    needs: unit-tests-gpulocal
    if: |
        github.event_name == 'push' &&
        needs.detect-changes.outputs.gpulocal == 'true'
        ||
        github.event_name == 'workflow_dispatch' &&
        inputs.run_build == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Build and push GpuLocal image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/gpulocal:latest

          docker build \
            --progress=plain \
            -t $IMAGE_NAME \
            -f GpuLocal/Dockerfile \
            GpuLocal

          docker push $IMAGE_NAME

  # Deploy — AzureFunction (machine-a)
  deploy-azurefunction:
    needs: build-azurefunction
    if: |
        github.event_name == 'push' &&
        needs.detect-changes.outputs.azurefunction == 'true'
        ||
        github.event_name == 'workflow_dispatch' &&
        inputs.run_deploy == true
    runs-on: [self-hosted, machine-b]
    
    steps:
      - name: Create Docker network
        run: docker network inspect azurerag-net >/dev/null 2>&1 || docker network create azurerag-net

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Pull & run AzureFunction container
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/azurefunction:latest
          docker stop azurefunction || true
          docker rm -f azurefunction || true
          sleep 2
          docker run -d \
            --name azurefunction \
            --network azurerag-net \
            -p 8010:80 \
            -e Gpu__LocalEmbeddingUrl=http://gpulocal:80/embed \
            ghcr.io/${{ github.repository_owner }}/azurefunction:latest


  # Deploy — GpuLocal (machine-b)
  deploy-gpulocal:
    needs: build-gpulocal
    if: |
        github.event_name == 'push' &&
        needs.detect-changes.outputs.gpulocal == 'true'
        ||
        github.event_name == 'workflow_dispatch' &&
        inputs.run_deploy == true
    runs-on: [self-hosted, machine-b]

    steps:
      - name: Create Docker network
        run: docker network inspect azurerag-net >/dev/null 2>&1 || docker network create azurerag-net
        
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Pull & run GpuLocal container
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/gpulocal:latest
          docker stop gpulocal || true
          docker rm gpulocal || true
          docker run -d \
            --name gpulocal \
            --network azurerag-net \
            ghcr.io/${{ github.repository_owner }}/gpulocal:latest

  # End-to-End Tests (Postman / Newman)
  e2e-tests:
    needs: [deploy-azurefunction, deploy-gpulocal]
    if: |
        always() &&
        (
          (
            needs.deploy-azurefunction.result == 'success' ||
            needs.deploy-gpulocal.result == 'success'
          )
          ||
          (
            github.event_name == 'workflow_dispatch' &&
            inputs.run_e2e == true
          )
        )
    runs-on: [self-hosted, machine-b]

    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install newman

      - name: Run Postman E2E tests
        run: |
          npx newman run E2E_Tests/AzureRag_E2E.postman_collection.json \
            --env-var "AZUREFUNCTION=http://localhost:8010" \
